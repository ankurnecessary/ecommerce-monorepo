name: API:Deployment

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/eslint-config/**"
      - "packages/typescript-config/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".nvmrc"
      - ".github/actions/setup-node-pnpm/**"
      - ".github/workflows/api-deployment.yml"
env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  AUTH_ACCESS_TOKEN_SECRET: ${{ secrets.AUTH_ACCESS_TOKEN_SECRET }}
  AUTH_ACCESS_TOKEN_TTL: ${{ secrets.AUTH_ACCESS_TOKEN_TTL}}
  AUTH_REFRESH_TOKEN_SECRET: ${{ secrets.AUTH_REFRESH_TOKEN_SECRET }}
  AUTH_REFRESH_TOKEN_TTL: ${{ secrets.AUTH_REFRESH_TOKEN_TTL}}
jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup node and pnpm
        uses: ./.github/actions/setup-node-pnpm
      
      - name: Generating prisma files
        run: pnpm --filter api exec prisma generate

      - name: Run lint
        run: pnpm --filter api lint

      - name: Run tests
        run: pnpm --filter api test

      - name: Make build
        run: pnpm --filter api build

  deploy-db:
    runs-on: ubuntu-latest
    needs: test-and-build
    env:
      NODE_ENV: production
      ADMIN_PASSWORD: ${{secrets.ADMIN_PASSWORD}}
      ADMIN_EMAIL: ${{secrets.ADMIN_EMAIL}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Write Aiven CA cert to file in apps/api
        run: |
          cd apps/api
          mkdir -p prisma
          echo "${{ secrets.AIVEN_CA_CERT }}" > prisma/ca.pem

      - name: Generating prisma files
        run: |
          cd apps/api
          pnpm exec prisma generate

      - name: DB migration
        run: |
          cd apps/api
          pnpm exec prisma migrate deploy

      - name: Seeding DB
        run: |
          cd apps/api
          pnpm exec prisma db seed

  deploy:
    runs-on: ubuntu-latest
    needs: deploy-db

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Generating prisma files
        run: pnpm --filter api exec prisma generate

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Read Node version
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_ENV
      
      - name: Write Aiven CA cert for Docker build
        run: |
          mkdir -p apps/api/prisma
          echo "${{ secrets.AIVEN_CA_CERT }}" > apps/api/prisma/ca.pem

      - name: Building a new docker image using Dockerfile.prod
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            -t docker-image:test \
            -f apps/api/Dockerfile.prod \
            --build-arg NODE_VERSION="${NODE_VERSION}" \
            .

      - name: Tagging the docker image for AWS ECR
        run: docker tag docker-image:test ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}:latest

      - name: Logging into AWS ECR
        run: aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Pushing Docker image to ECR
        run: docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}:latest

      - name: Updating AWS Lambda function
        run: aws lambda update-function-code --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} --image-uri ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}:latest --publish

      - name: Remove generated CA cert
        if: always()
        run: rm -f apps/api/prisma/ca.pem
